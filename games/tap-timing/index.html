<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tap Timing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button id="backBtn" class="small-btn">← Hub</button>
      <div class="stats">
        <span id="score">Score: 0</span>
        <span id="round">Round: 1</span>
      </div>
    </div>
    <h1>Tap Timing</h1>
    <p>Tap when the moving marker lands on the center zone.</p>

    <div class="track">
      <div class="target"></div>
      <div id="marker" class="marker"></div>
    </div>

    <button id="tapBtn" class="tap-btn">Tap Now</button>
    <p id="message" class="message"></p>
  </div>
  <script src="game.js"></script>
</body>
</html>
