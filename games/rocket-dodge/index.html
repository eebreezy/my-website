<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Dodge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button id="backBtn" class="small-btn">← Hub</button>
      <div class="scoreboard">
        <span id="score">Score: 0</span>
        <span id="best">Best: 0</span>
      </div>
    </div>
    <h1>Rocket Dodge</h1>
    <p>Hold anywhere to rise. Release to fall.</p>
    <canvas id="game" width="360" height="560" aria-label="Rocket Dodge game"></canvas>
    <button id="restartBtn" class="restart-btn">Restart</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
