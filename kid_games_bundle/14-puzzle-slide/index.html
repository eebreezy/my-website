<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Puzzle Slide</title>
  <link rel="stylesheet" href="../shared/css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Puzzle Slide</div>
        <div class="small"><a href="../index.html">← Back to Games</a></div>
      </div>
      <div class="stats">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Level: <span id="level">1</span></div>
        <div class="badge">Best: <span id="best">0</span></div>
      </div>
    </div>
    
<div class="panel center">
  <p>Put the numbers in order.</p>
  <div id="grid" style="display:grid;grid-template-columns:repeat(3,90px);gap:8px;justify-content:center;margin:20px 0"></div>
  <div class="controls" style="justify-content:center"><button id="shuffleBtn">Shuffle</button></div>
</div>

  </div>
  <script src="../shared/js/common.js"></script>
  <script src="game.js"></script>
</body>
</html>
