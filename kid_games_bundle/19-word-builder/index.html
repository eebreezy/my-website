<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Word Builder</title>
  <link rel="stylesheet" href="../shared/css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Word Builder</div>
        <div class="small"><a href="../index.html">← Back to Games</a></div>
      </div>
      <div class="stats">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Level: <span id="level">1</span></div>
        <div class="badge">Best: <span id="best">0</span></div>
      </div>
    </div>
    
<div class="panel center">
  <div class="big" id="emojiHint" style="font-size:3rem">🐱</div>
  <div id="scramble" class="big" style="font-size:2rem;margin-top:10px">TCA</div>
  <div id="letterBtns" class="controls" style="justify-content:center;margin-top:16px"></div>
  <div class="big" id="built" style="font-size:2rem;margin-top:12px">_ _ _</div>
  <div class="controls" style="justify-content:center"><button id="clearBtn">Clear</button><button id="newBtn">New Word</button></div>
</div>

  </div>
  <script src="../shared/js/common.js"></script>
  <script src="game.js"></script>
</body>
</html>
