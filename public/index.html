<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OmFunny</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>😂 OmFunny</h1>
      <p class="sub">Approved memes only</p>
    </div>
    <div class="auth-buttons">
      <button id="showAuthBtn" class="secondary">Log in / Sign up</button>
      <button id="logoutBtn" class="secondary hidden">Log out</button>
      <a class="secondary link-btn" href="admin.html">Admin</a>
    </div>
  </header>

  <main class="layout">
    <section class="panel upload-panel">
      <h2>Upload a meme</h2>
      <p class="muted">Uploads go into review first. They are not public until approved.</p>
      <form id="uploadForm">
        <label>Caption
          <textarea id="captionInput" maxlength="220" placeholder="Write a caption..." required></textarea>
        </label>

        <label>Category
          <select id="categoryInput">
            <option value="funny">Funny</option>
            <option value="animals">Animals</option>
            <option value="relatable">Relatable</option>
            <option value="gaming">Gaming</option>
            <option value="wtf">WTF</option>
            <option value="other">Other</option>
          </select>
        </label>

        <label>Image
          <input id="fileInput" type="file" accept="image/*" required>
        </label>

        <button id="uploadBtn" type="submit">Upload for review</button>
        <p id="uploadStatus" class="status"></p>
      </form>
    </section>

    <section class="panel auth-panel hidden" id="authPanel">
      <h2>Account</h2>
      <form id="authForm">
        <label>Email
          <input id="emailInput" type="email" autocomplete="email" required>
        </label>
        <label>Password
          <input id="passwordInput" type="password" autocomplete="current-password" minlength="6" required>
        </label>
        <div class="auth-actions">
          <button type="button" id="signupBtn">Sign up</button>
          <button type="button" id="loginBtn">Log in</button>
        </div>
        <p id="authStatus" class="status"></p>
      </form>
    </section>

    <section class="feed-wrap">
      <div class="feed-topbar">
        <h2>Latest approved memes</h2>
      </div>
      <div id="feed" class="feed"></div>
    </section>
  </main>

  <template id="memeCardTemplate">
    <article class="card">
      <img class="meme-image" alt="Meme image">
      <div class="card-body">
        <p class="caption"></p>
        <div class="meta-row">
          <span class="category"></span>
          <span class="small"></span>
        </div>
        <section class="comments">
          <h3>Comments</h3>
          <div class="comments-list"></div>
          <form class="comment-form">
            <input class="comment-input" type="text" maxlength="300" placeholder="Add a comment..." required>
            <button type="submit">Post</button>
          </form>
          <p class="comment-status status"></p>
        </section>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
