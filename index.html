<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OmFunny</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div>
      <h1>😂 OmFunny</h1>
      <p class="sub">Approved memes only</p>
    </div>
    <div class="auth-buttons">
      <button id="showAuthBtn" class="secondary">Log in / Sign up</button>
      <button id="logoutBtn" class="secondary hidden">Log out</button>
      <a class="secondary link-btn" href="admin.html">Admin</a>
    </div>
  </header>

  <main class="layout">
    <section class="panel upload-panel">
      <h2>Upload a meme</h2>
      <p class="muted">Uploads go into review first. They are not public until approved.</p>
      <form id="uploadForm">
        <label>Caption
          <textarea id="captionInput" maxlength="220" placeholder="Write a caption..." required></textarea>
        </label>

        <label>Category
          <select id="categoryInput">
            <option value="funny">Funny</option>
            <option value="animals">Animals</option>
            <option value="relatable">Relatable</option>
            <option value="gaming">Gaming</option>
            <option value="wtf">WTF</option>
            <option value="other">Other</option>
          </select>
        </label>

        <label>Image
          <input id="fileInput" type="file" accept="image/*" required>
        </label>

        <button id="uploadBtn" type="submit">Upload for review</button>
        <p id="uploadStatus" class="status"></p>
      </form>
    </section>

    <section class="panel auth-panel hidden" id="authPanel">
      <h2>Account</h2>

      <form id="authForm">
        <label id="usernameField" class="hidden">Username
          <input
            id="usernameInput"
            type="text"
            maxlength="30"
            autocomplete="username"
            placeholder="Choose a username"
          >
        </label>

        <label>Email
          <input id="emailInput" type="email" autocomplete="email" required>
        </label>

        <label>Password
          <input id="passwordInput" type="password" autocomplete="current-password" minlength="6" required>
        </label>

        <div class="auth-actions">
          <button type="button" id="loginBtn">Log in</button>
          <button type="button" id="signupBtn" class="hidden">Create account</button>
        </div>

        <div id="verificationControls" class="auth-actions hidden">
          <button type="button" id="resendVerificationBtn" class="secondary">Resend verification email</button>
          <button type="button" id="refreshVerificationBtn" class="secondary">I've verified, refresh</button>
        </div>

        <div id="authModeToggle" style="margin-top: 8px;">
          <button type="button" id="switchAuthModeBtn" class="secondary">Need an account? Sign up</button>
        </div>

        <p id="authStatus" class="status"></p>
      </form>
    </section>

    <section class="feed-wrap">
      <div class="feed-topbar">
        <h2>Latest approved memes</h2>

        <label style="display:block; max-width:260px; margin-top:10px;">
          Browse category
          <select id="feedCategoryFilter">
            <option value="all">All categories</option>
            <option value="funny">Funny</option>
            <option value="animals">Animals</option>
            <option value="relatable">Relatable</option>
            <option value="gaming">Gaming</option>
            <option value="wtf">WTF</option>
            <option value="other">Other</option>
          </select>
        </label>
      </div>

      <div id="feed" class="feed"></div>
    </section>
  </main>

  <template id="memeCardTemplate">
    <article class="card">
      <img class="meme-image" alt="Meme image">
      <div class="card-body">
        <p class="caption"></p>
        <div class="meta-row">
          <span class="category"></span>
          <span class="small"></span>
        </div>

        <section class="comments">
          <button type="button" class="comments-toggle secondary">Show comments (0)</button>

          <div class="comments-body hidden">
            <h3>Comments</h3>
            <div class="comments-list"></div>
            <form class="comment-form">
              <input class="comment-input" type="text" maxlength="300" placeholder="Add a comment..." required>
              <button type="submit">Post</button>
            </form>
            <p class="comment-status status"></p>
          </div>
        </section>
      </div>
    </article>
  </template>

<footer>
  <a href="terms.html">Terms</a> |
  <a href="content-policy.html">Content Policy</a> |
  <a href="dmca.html">DMCA</a>
</footer>

  <script type="module" src="app.js"></script>
</body>
</html>
