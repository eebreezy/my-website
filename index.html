<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TikTok Style Mini Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1>Mini Games Hub</h1>
    <p>5 fast mobile-first games, built for quick taps and replay.</p>
  </header>

  <main class="grid" aria-label="Games list">
    <button class="card" data-path="games/spot-difference/index.html">
      <span class="emoji">🟦</span>
      <span class="title">Spot Difference</span>
      <span class="desc">Find the odd tile before time runs out.</span>
    </button>

    <button class="card" data-path="games/hoop-streak/index.html">
      <span class="emoji">🏀</span>
      <span class="title">Hoop Streak</span>
      <span class="desc">Tap at the right time to keep the streak alive.</span>
    </button>

    <button class="card" data-path="games/rocket-dodge/index.html">
      <span class="emoji">🚀</span>
      <span class="title">Rocket Dodge</span>
      <span class="desc">Hold to rise, release to fall, dodge the walls.</span>
    </button>

    <button class="card" data-path="games/tap-timing/index.html">
      <span class="emoji">🎯</span>
      <span class="title">Tap Timing</span>
      <span class="desc">Hit the moving target as close to center as possible.</span>
    </button>

    <button class="card" data-path="games/color-switch/index.html">
      <span class="emoji">🌈</span>
      <span class="title">Color Switch</span>
      <span class="desc">Flip colors fast and survive the rush.</span>
    </button>
  </main>

  <script src="main.js"></script>
</body>
</html>
