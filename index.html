<html lang="en">
<head>

     crossorigin="anonymous"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Star Hopper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="wrap">
    <header id="topbar">
      <div class="brand">
        <div class="logo">★</div>
        <div>
          <div class="title">Star Hopper</div>
          <div class="subtitle">Collect stars • Keep streak • Level up!</div>
        </div>
      </div>

      <div class="controls">
        <button id="btnStart" class="btn primary">Start</button>
        <button id="btnPause" class="btn">Pause</button>
        <button id="btnSound" class="btn">Sound: On</button>
      </div>
    </header>

    <main id="main">
      <canvas id="game" aria-label="Game canvas"></canvas>

      <!-- Mobile-friendly big jump button -->
      <button id="jumpBtn" class="jumpBtn" aria-label="Jump button">JUMP</button>

      <section id="hud">
        <div class="hudBox"><div class="hudLabel">Score</div><div id="score" class="hudValue">0</div></div>
        <div class="hudBox"><div class="hudLabel">Streak</div><div id="streak" class="hudValue">0</div></div>
        <div class="hudBox"><div class="hudLabel">Level</div><div id="level" class="hudValue">1</div></div>
        <div class="hudBox"><div class="hudLabel">Best</div><div id="best" class="hudValue">0</div></div>
      </section>

      <div id="overlay" class="overlay hidden">
        <div class="panel">
          <div id="overlayTitle" class="panelTitle">Star Hopper</div>
          <div id="overlayMsg" class="panelMsg">Tap Start to play!</div>
          <button id="btnOverlay" class="btn primary big">Play</button>
          <div class="panelSmall">Tap/Click to jump • Space/↑ works on PC</div>
        </div>
      </div>
    </main>

    <footer id="footer">
      <span>Mobile + PC compatible • Touch + keyboard • No external assets</span>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
