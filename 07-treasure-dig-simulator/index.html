<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Treasure Dig Simulator | OmFunny Arcade</title>
  <link rel="stylesheet" href="../shared/css/site.css" />
</head>
<body class="game-shell">
  <div id="game-root">
    <a class="back-link" href="../index.html">← All Games</a>
    <div class="canvas-wrap"></div>
    <div class="hud">
      <div class="panel"><div class="stat">Game</div><div class="value" id="title">Treasure Dig Simulator</div></div>
      <div class="panel"><div class="stat">Score</div><div class="value" id="score">0</div></div>
      <div class="panel"><div class="stat">Goal</div><div class="value" id="goal">Goal</div></div>
      <div class="panel"><div class="stat">Status</div><div class="value" id="status">Playing</div></div>
      <div class="panel"><div class="stat">Best</div><div class="value" id="best">0</div></div>
    </div>
    <div class="help">WASD / drag stick to move · Space / Jump button to jump</div>
    <div class="top-right">
      <button id="restart" class="btn">Restart</button>
      <button id="back-home" class="btn primary hidden">Back Home</button>
    </div>
    <div id="message" class="message hidden">
      <h2 id="message-title">Ready?</h2>
      <p id="message-text">Jump in and play.</p>
      <button id="restart-modal" class="btn warn">Restart</button>
    </div>
    <div class="controls">
      <div class="pad"><div class="stick"></div></div>
      <div class="jump-wrap"><button class="jump">JUMP</button></div>
    </div>
  </div>
  <script type="module" src="./game.js"></script>
</body>
</html>
