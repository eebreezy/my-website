<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rainbow Stack</title>
  <link rel="stylesheet" href="../shared/css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Rainbow Stack</div>
        <div class="small"><a href="../index.html">← Back to Games</a></div>
      </div>
      <div class="stats">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Level: <span id="level">1</span></div>
        <div class="badge">Best: <span id="best">0</span></div>
      </div>
    </div>
    
<div class="grid2">
  <div class="panel">
    <div class="big center" style="font-size:1.4rem">Stack in this order:</div>
    <div class="row center" id="targetRow" style="justify-content:center"></div>
  </div>
  <div class="panel">
    <div id="chips" class="row" style="justify-content:center;min-height:90px"></div>
    <div id="stack" class="row" style="justify-content:center;min-height:90px;margin-top:20px"></div>
    <div class="controls"><button id="resetBtn">Reset</button></div>
  </div>
</div>

  </div>
  <script src="../shared/js/common.js"></script>
  <script src="game.js"></script>
</body>
</html>
