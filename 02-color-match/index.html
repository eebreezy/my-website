<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Color Match</title>
  <link rel="stylesheet" href="../shared/css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Color Match</div>
        <div class="small"><a href="../index.html">← Back to Games</a></div>
      </div>
      <div class="stats">
        <div class="badge">Score: <span id="score">0</span></div>
        <div class="badge">Level: <span id="level">1</span></div>
        <div class="badge">Best: <span id="best">0</span></div>
      </div>
    </div>
    
<div class="panel center">
  <div id="word" class="big">BLUE</div>
  <p>Tap the button that matches the text color, not the word.</p>
  <div id="choices" class="controls" style="justify-content:center"></div>
  <div class="controls" style="justify-content:center"><button id="startBtn">New Round</button></div>
</div>

  </div>
  <script src="../shared/js/common.js"></script>
  <script src="game.js"></script>
</body>
</html>
